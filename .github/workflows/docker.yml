
name: CI Pipeline - ejemplo001

# Se ejecuta en cada push o PR en la rama main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write 

    steps:
      # Descargar el código del repo
      - name: Descargar el codigo del reposotorio
        uses: actions/checkout@v4

      # Login en GHCR
      - name: Log in en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Construir la imagen
      - name: Construir la imagen Docker
        run: |
          docker build -t ghcr.io/${{ github.repository }}/ejemplo001:1.0 .

      # Subir la imagen a GHCR
      - name: Push la imagen Docker a GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}/ejemplo001:1.0