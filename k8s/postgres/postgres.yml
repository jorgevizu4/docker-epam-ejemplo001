# Deployment que crea un contenedor PostgreSQL 15
# Variables de entorno establecen la base de datos/usuario/contraseña.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: demo
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_DB
              value: exampledb      # nombre de la base de datos inicial
            - name: POSTGRES_USER
              value: exampleuser    # usuario admin de la base
            - name: POSTGRES_PASSWORD
              value: examplepass    # contraseña del usuario
          ports:
            - containerPort: 5432    # puerto estándar de Postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}              # almacenamiento efímero (para demo)
---
# Servicio interno para comunicar con la instancia de Postgres
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: demo
spec:
  selector:
    app: postgres
  ports:
    #- protocol: TCP
    - port: 5432
      targetPort: 5432
  type: ClusterIP
